<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cmd + Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="title-bar">
      <span class="title-arrow">&#9650;</span>
      <h1 class="title">Cmd + Up</h1>
    </header>
    <div id="trail"></div>
    <div id="stage">
      <h2 id="question"></h2>
      <form id="input-area" autocomplete="off">
        <textarea id="answer" rows="1" placeholder="Type here..." autofocus></textarea>
        <div id="hint">PRESS ENTER</div>
      </form>
      <div id="buttons"></div>
    </div>
    <div id="result"></div>
  </div>

  <button id="fb-toggle" title="Send feedback">&#9998;</button>
  <div id="fb-panel" class="hidden">
    <div id="fb-header">
      <span>MESSAGE TO BUILDER</span>
      <button id="fb-close">&times;</button>
    </div>
    <textarea id="fb-input" rows="3" placeholder="What should change?"></textarea>
    <div id="fb-footer">
      <span id="fb-status"></span>
      <button id="fb-send" class="btn">SEND</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
