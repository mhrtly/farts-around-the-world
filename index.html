<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GFMS — Global Flatulence Monitoring System</title>
    <meta name="description" content="Real-time worldwide gas event intelligence and analysis" />
    <style>
      /* Inline critical boot screen CSS — no JS dependency */
      html, body { margin: 0; padding: 0; background: #06090d; overflow: hidden; }
      #boot-screen {
        position: fixed; inset: 0; z-index: 99999;
        background: #06090d; color: #00ff41;
        font-family: 'JetBrains Mono', 'SF Mono', 'Monaco', 'Cascadia Code', 'Courier New', monospace;
        font-size: 13px; padding: 0 40px;
        display: flex; flex-direction: column; justify-content: center;
        transition: opacity 0.7s ease;
      }
      #boot-screen.fade-out { opacity: 0; pointer-events: none; }
      .boot-line {
        opacity: 0; transform: translateY(4px);
        animation: bootIn 0.3s ease forwards;
        line-height: 1.8;
      }
      .boot-header { font-size: 15px; font-weight: 700; letter-spacing: 0.18em; margin-bottom: 6px; color: #00ff41; }
      .boot-divider { color: #1a2a1a; margin-bottom: 14px; letter-spacing: 0; }
      .boot-ok { color: #44ff88; }
      .boot-loading { color: #ffaa00; }
      .boot-progress { margin-top: 14px; }
      .boot-bar { width: 340px; height: 3px; background: #0f1f0f; margin-top: 8px; border: 1px solid #1a3a1a; }
      .boot-bar-fill { height: 100%; background: #00ff41; width: 0%; transition: width 0.15s ease; box-shadow: 0 0 6px #00ff41; }
      .boot-pct { font-size: 10px; color: #44ff88; margin-top: 4px; letter-spacing: 0.2em; }
      @keyframes bootIn { to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="boot-screen">
      <div class="boot-line boot-header" style="animation-delay:0s">GLOBAL FLATULENCE MONITORING SYSTEM v2.1.4</div>
      <div class="boot-line boot-divider" style="animation-delay:0.2s">────────────────────────────────────────────────</div>
      <div class="boot-line" style="animation-delay:0.5s"><span class="boot-ok">[OK]</span>&nbsp; Initializing olfactory sensor array...</div>
      <div class="boot-line" style="animation-delay:0.9s"><span class="boot-ok">[OK]</span>&nbsp; Calibrating acoustic detection grid...</div>
      <div class="boot-line" style="animation-delay:1.3s"><span class="boot-ok">[OK]</span>&nbsp; Establishing satellite uplink (47 birds)...</div>
      <div class="boot-line" id="boot-geo-line" style="animation-delay:1.7s"><span class="boot-loading" id="boot-geo-tag">[..]</span>&nbsp; Loading geographic intelligence database...</div>
      <div class="boot-line" id="boot-stream-line" style="animation-delay:0s;opacity:0"></div>
      <div class="boot-line boot-progress" style="animation-delay:2.0s">
        <div class="boot-bar"><div class="boot-bar-fill" id="boot-fill"></div></div>
        <div class="boot-pct" id="boot-pct">0%</div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Animate progress bar and dismiss boot screen
      ;(function() {
        var fill   = document.getElementById('boot-fill')
        var pct    = document.getElementById('boot-pct')
        var geoTag = document.getElementById('boot-geo-tag')
        var streamLine = document.getElementById('boot-stream-line')
        var boot   = document.getElementById('boot-screen')
        var start  = null
        var dur    = 2200  // ms to fill bar

        function step(ts) {
          if (!start) start = ts
          var progress = Math.min((ts - start) / dur, 1)
          var pctVal   = Math.round(progress * 100)
          fill.style.width = pctVal + '%'
          pct.textContent  = pctVal + '%'

          if (progress >= 0.72 && geoTag.textContent === '[..]') {
            geoTag.textContent  = '[OK]'
            geoTag.style.color  = '#44ff88'
            streamLine.style.opacity   = '1'
            streamLine.style.animation = 'none'
            streamLine.innerHTML = '<span style="color:#44ff88">[OK]</span>&nbsp; Event stream connected. Monitoring active.'
          }

          if (progress < 1) {
            requestAnimationFrame(step)
          } else {
            setTimeout(function() {
              boot.classList.add('fade-out')
              setTimeout(function() { boot.style.display = 'none' }, 750)
            }, 400)
          }
        }

        // Start after the last boot line appears (~2s)
        setTimeout(function() { requestAnimationFrame(step) }, 2050)
      })()
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
