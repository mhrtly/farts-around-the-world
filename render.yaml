services:
  - type: web
    name: farts-around-the-world
    plan: starter
    runtime: node
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/index.js
    disk:
      name: farts-data
      mountPath: /data
      sizeGB: 3
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/farts.db
